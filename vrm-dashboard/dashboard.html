<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VRM Custom Dashboard</title>
<style>
  /* ===================================================================
     THEME - edit these variables to restyle the whole dashboard
     =================================================================== */
  :root {
    --bg:        #0f1216;
    --panel:     #181d24;
    --panel-2:   #1f2630;
    --border:    #2a323d;
    --text:      #e6e9ee;
    --muted:     #8b95a4;
    --accent:    #36c2a4;   /* Victron-ish teal */
    --accent-2:  #f2b338;   /* solar/amber       */
    --danger:    #e0556b;
    --radius:    14px;
    --gap:       16px;
    --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text); font-family: var(--font);
    padding: 24px; line-height: 1.5;
  }
  header.topbar {
    display: flex; align-items: baseline; justify-content: space-between;
    flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
  }
  header.topbar h1 { font-size: 20px; font-weight: 600; margin: 0; }
  header.topbar .meta { color: var(--muted); font-size: 13px; }
  #status.err { color: var(--danger); }

  /* Featured key-metric tiles */
  .featured {
    display: grid; gap: var(--gap); margin-bottom: 24px;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  }
  .kpi {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    border-left: 4px solid var(--accent);
  }
  .kpi.amber { border-left-color: var(--accent-2); }
  .kpi .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .kpi .vstack { margin-top: 4px; display: flex; flex-direction: column; gap: 2px; }
  .kpi .val { font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .kpi .val.big { font-size: 30px; }
  .kpi .val.none { color: var(--muted); font-weight: 400; }
  .kpi .sub   { color: var(--muted); font-size: 12px; margin-top: 6px; }
  .kpi.missing { border-left-color: var(--muted); opacity: .8; }
</style>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>VRM Dashboard <span id="siteid" class="meta"></span></h1>
      <div id="status" class="meta">connecting…</div>
    </div>
    <div class="meta" id="updated"></div>
  </header>

  <section class="featured" id="featured"></section>

<script src="/config.js"></script>
<script>
  /* ===================================================================
     CONFIG - customize behavior and which metrics are "featured"
     =================================================================== */
  const REFRESH_MS = 10000;   // how often to poll VRM (10s)

  // Live weather (Open-Meteo, no API key). lat/lon auto-detected from your GX
  // GPS when available, otherwise these defaults (Tierra Verde / St. Petersburg, FL).
  const WEATHER = {
    lat: 27.7152, lon: -82.6777,
    tempUnit: "fahrenheit",     // or "celsius"
    windUnit: "mph",            // or "kmh", "ms", "kn"
    refreshMs: 10 * 60 * 1000,  // every 10 minutes
  };

  // Featured KPI tiles, shown in this order. Each tile has one or more `items`.
  // Matchers (most specific wins): `desc` = exact description, `device` = substring
  // of the Device name (string or array), `customName` = the sensor's custom name,
  // `all`/`match` = substring fallback over Device+description+customName.
  // `weather: true` makes a tile show the live weather feed. `amber` tints the stripe.
  // Reorder / add / remove freely.
  const FEATURED = [
    { label: "Grid",            amber: false, items: [
        { desc: "Input voltage phase 1",  device: "VE.Bus" },
        { desc: "Input current phase 1",  device: "VE.Bus" } ] },
    { label: "Inverter status", amber: false, items: [
        { desc: "VE.Bus state",           device: "VE.Bus" } ] },
    { label: "AC Load",         amber: false, items: [
        { desc: "Output voltage phase 1", device: "VE.Bus" },
        { desc: "Output current phase 1", device: "VE.Bus" } ] },
    { label: "Battery SOC",     amber: false, items: [
        { desc: "State of charge",        device: "Battery Monitor" } ] },
    { label: "Battery voltage", amber: false, items: [
        { desc: "Voltage",                device: "Battery Monitor" } ] },
    { label: "Battery current", amber: false, items: [
        { desc: "Current",                device: "Battery Monitor" } ] },
    { label: "Time to go",      amber: false, items: [
        { desc: "Time to go",             device: "Battery Monitor" } ] },
    { label: "Fridge",          amber: true,  items: [
        { desc: "Temperature", customName: "Fridge",      toF: true },
        { desc: "Humidity",    customName: "Fridge" } ] },
    { label: "VicRoom",         amber: true,  items: [
        { desc: "Temperature", customName: "VicRoom",     toF: true },
        { desc: "Humidity",    customName: "VicRoom" } ] },
    { label: "Kitchen",         amber: true,  items: [
        { desc: "Temperature", customName: "Kitchen",     toF: true },
        { desc: "Humidity",    customName: "Kitchen" } ] },
    { label: "Engine Room",     amber: true,  items: [
        { desc: "Temperature", customName: "Engine Room", toF: true },
        { desc: "Humidity",    customName: "Engine Room" } ] },
    { label: "Weather",         amber: true,  weather: true },
  ];

  /* =================================================================== */

  const $ = (id) => document.getElementById(id);
  if (window.VRM_CONFIG) $("siteid").textContent = "· " + window.VRM_CONFIG.site;
  let lastRecords = [];
  let weatherState = null;

  function fmt(rec) {
    if (rec.formattedValue !== undefined && rec.formattedValue !== null && rec.formattedValue !== "")
      return rec.formattedValue;
    if (rec.rawValue !== undefined && rec.rawValue !== null) return String(rec.rawValue);
    return "–";
  }
  function deviceOf(rec) { return rec.Device || rec.device || rec.dbusServiceType || "Other"; }
  function toNumber(rec) {
    if (rec.rawValue != null && rec.rawValue !== "" && !isNaN(Number(rec.rawValue))) return Number(rec.rawValue);
    const m = String(rec.formattedValue || "").match(/-?\d+(\.\d+)?/);
    return m ? Number(m[0]) : NaN;
  }
  // Render a metric's value, applying optional per-item transforms (e.g. °C → °F).
  function displayValue(rec, it) {
    if (it && it.toF) {
      const c = toNumber(rec);          // VRM raw temperature is in °C
      if (isFinite(c)) return Math.round(c * 9 / 5 + 32) + "°F";
    }
    return fmt(rec);
  }

  const lc = (s) => String(s == null ? "" : s).toLowerCase();
  const asList = (d) => (d == null ? [] : (Array.isArray(d) ? d : [d]));
  // Each physical device is keyed by Device name + instance, so we can join a
  // sensor's "... custom name" record to its value records.
  const instKey = (r) => lc(r.Device) + "#" + (r.instance !== undefined ? r.instance : r.idDeviceType);

  function buildCustomNames(records) {
    const map = {};
    for (const r of records) {
      if (lc(r.description).includes("custom name")) {
        const n = (r.formattedValue != null && r.formattedValue !== "") ? r.formattedValue : r.rawValue;
        if (n != null && String(n).trim() !== "") map[instKey(r)] = String(n);
      }
    }
    return map;
  }
  const customNameOf = (r, names) => names[instKey(r)] || "";

  function haystack(rec, names) {
    return [rec.Device, rec.description, customNameOf(rec, names),
            rec.code, rec.dataAttributeName, rec.dbusServiceType]
      .filter(Boolean).join(" ").toLowerCase();
  }

  function findMetric(records, m, names) {
    return records.find((r) => {
      if (m.desc && lc(r.description) !== lc(m.desc)) return false;
      if (m.device) {
        const devs = asList(m.device).map(lc);
        if (!devs.some((d) => lc(r.Device).includes(d))) return false;
      }
      if (m.customName && !lc(customNameOf(r, names)).includes(lc(m.customName))) return false;
      if (m.all && !m.all.every((t) => haystack(r, names).includes(lc(t)))) return false;
      if (m.match && !haystack(r, names).includes(lc(m.match))) return false;
      return true;
    });
  }

  const WMO = {0:"Clear",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",45:"Fog",48:"Rime fog",
    51:"Light drizzle",53:"Drizzle",55:"Heavy drizzle",56:"Freezing drizzle",57:"Freezing drizzle",
    61:"Light rain",63:"Rain",65:"Heavy rain",66:"Freezing rain",67:"Freezing rain",
    71:"Light snow",73:"Snow",75:"Heavy snow",77:"Snow grains",80:"Rain showers",81:"Rain showers",
    82:"Violent showers",85:"Snow showers",86:"Snow showers",95:"Thunderstorm",96:"Thunderstorm",99:"Thunderstorm"};

  function siteLatLon(records) {
    const num = (r) => { if (!r) return NaN; const v = (r.rawValue != null ? r.rawValue : r.formattedValue); return parseFloat(String(v)); };
    const la = records.find((r) => lc(r.Device).includes("gateway") && lc(r.description) === "latitude");
    const lo = records.find((r) => lc(r.Device).includes("gateway") && lc(r.description) === "longitude");
    const a = num(la), b = num(lo);
    return (isFinite(a) && isFinite(b)) ? [a, b] : null;
  }

  async function fetchWeather() {
    try {
      const ll = siteLatLon(lastRecords) || [WEATHER.lat, WEATHER.lon];
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${ll[0]}&longitude=${ll[1]}` +
        `&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m` +
        `&temperature_unit=${WEATHER.tempUnit}&wind_speed_unit=${WEATHER.windUnit}`;
      const res = await fetch(url);
      const d = await res.json();
      weatherState = (d && d.current) ? Object.assign({ units: d.current_units || {} }, d.current) : { error: "no data" };
    } catch (e) {
      weatherState = { error: e.message };
    }
    renderFeatured(lastRecords);
  }

  function weatherCard(label) {
    const w = weatherState;
    let values, sub;
    if (!w) { values = `<div class="val big none">…</div>`; sub = "loading weather"; }
    else if (w.error) { values = `<div class="val none">–</div>`; sub = "weather unavailable"; }
    else {
      const t = Math.round(w.temperature_2m);
      const tu = (w.units && w.units.temperature_2m) || (WEATHER.tempUnit === "celsius" ? "°C" : "°F");
      const cond = WMO[w.weather_code] || "—";
      values = `<div class="val big">${t}${esc(tu)}</div><div class="val">${esc(cond)}</div>`;
      sub = `RH ${w.relative_humidity_2m}% · wind ${Math.round(w.wind_speed_10m)} ${esc(WEATHER.windUnit)}`;
    }
    return `<div class="kpi amber"><div class="label">${esc(label)}</div><div class="vstack">${values}</div><div class="sub">${sub}</div></div>`;
  }

  function renderFeatured(records) {
    const names = buildCustomNames(records);
    const misses = [];
    const cards = FEATURED.map((f) => {
      if (f.weather) return weatherCard(f.label);
      const found = f.items.map((it) => findMetric(records, it, names));
      const anyHit = found.some(Boolean);
      if (!anyHit) misses.push(f.label);
      const single = f.items.length === 1;
      const valuesHtml = found.map((rec, i) => {
        if (!rec) return `<div class="val ${single ? "big" : ""} none">–</div>`;
        return `<div class="val ${single ? "big" : ""}">${esc(displayValue(rec, f.items[i]))}</div>`;
      }).join("");
      const sub = found.find(Boolean);
      const subLabel = sub ? (customNameOf(sub, names) || deviceOf(sub)) : "no match — adjust matcher";
      return `
        <div class="kpi ${f.amber ? "amber" : ""} ${anyHit ? "" : "missing"}">
          <div class="label">${esc(f.label)}</div>
          <div class="vstack">${valuesHtml}</div>
          <div class="sub">${esc(subLabel)}</div>
        </div>`;
    }).join("");
    $("featured").innerHTML = cards;
    if (misses.length) console.warn("Featured tiles with no match:", misses.join(", "));
  }

  function esc(s) {
    return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  }

  async function tick() {
    try {
      const res = await fetch("/api/diagnostics");
      const data = await res.json();
      if (!res.ok || data.success === false) {
        const detail = (data && (data.errors || data.error)) ? JSON.stringify(data.errors || data.error) : ("HTTP " + res.status);
        $("status").textContent = "API error: " + detail + (res.status === 401 ? " — check VRM_TOKEN" : "");
        $("status").className = "meta err";
        return;
      }
      const records = data.records || [];
      lastRecords = records;
      $("status").textContent = `${records.length} measurements`;
      $("status").className = "meta";
      $("updated").textContent = "updated " + new Date().toLocaleTimeString();
      renderFeatured(records);
    } catch (e) {
      $("status").textContent = "connection error: " + e.message;
      $("status").className = "meta err";
    }
  }

  tick();
  setInterval(tick, REFRESH_MS);
  fetchWeather();
  setInterval(fetchWeather, WEATHER.refreshMs);

  // Heartbeat: lets the server auto-stop a few seconds after this tab is closed.
  // (A refresh resumes beating quickly, so it survives reloads.)
  function heartbeat() { fetch("/heartbeat").catch(() => {}); }
  heartbeat();
  setInterval(heartbeat, 3000);
</script>
</body>
</html>
